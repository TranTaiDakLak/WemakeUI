<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 — Không có quyền truy cập | WemakeUI</title>
  <link rel="stylesheet" href="../css/wemake.css">
</head>
<body>
  <div class="wx-error-page">
    <div class="wx-error-blob" style="top:-40px;left:50%;transform:translateX(-50%);width:300px;height:300px;background:var(--wx-warning,#f59e0b);opacity:0.12;"></div>
    <div class="wx-error-blob" style="bottom:-60px;right:-60px;width:340px;height:340px;opacity:0.2;"></div>

    <div class="wx-error-box">
      <!-- Lock icon -->
      <div style="font-size:4rem;margin-bottom:1rem;line-height:1;">🔒</div>

      <div class="wx-error-code">403</div>
      <h1 class="wx-error-title">Truy cập bị từ chối</h1>
      <p class="wx-error-desc">
        Bạn không có quyền xem trang này.<br>
        Nếu bạn cho rằng đây là sự nhầm lẫn, hãy liên hệ quản trị viên.
      </p>

      <div class="wx-error-actions">
        <a href="../index.html" class="wx-btn wx-btn-primary">🏠 Về trang chủ</a>
        <a href="../auth/login.html" class="wx-btn wx-btn-secondary">🔄 Đăng nhập với tài khoản khác</a>
      </div>

      <div style="margin-top:2rem;padding:0.8rem 1.2rem;background:var(--wx-warning-bg,rgba(245,158,11,0.08));border:1px solid var(--wx-warning,#f59e0b);border-radius:8px;font-size:0.85rem;color:var(--wx-text-muted);">
        ⚠️ Nếu bạn cần quyền truy cập, hãy gửi yêu cầu tới <strong>admin@wemake.vn</strong>
      </div>

      <p style="margin-top:1.5rem;font-size:0.75rem;color:var(--wx-text-muted);opacity:0.6;">
        Error ID: <code>ERR-403-z7d4e1</code>
      </p>
    </div>
  </div>

  <script src="../js/wemake.js"></script>
</body>
</html>
