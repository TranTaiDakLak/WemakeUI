<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ngoại tuyến — Mất kết nối mạng | WemakeUI</title>
  <link rel="stylesheet" href="../css/wemake.css">
</head>
<body>
  <div class="wx-error-page">
    <div class="wx-error-blob" style="top:-80px;left:-80px;width:320px;height:320px;background:var(--wx-text-muted,#9ca3af);opacity:0.1;"></div>
    <div class="wx-error-blob" style="bottom:-60px;right:-60px;width:360px;height:360px;background:var(--wx-text-muted,#9ca3af);opacity:0.08;"></div>

    <div class="wx-error-box">
      <!-- Wifi-off SVG icon -->
      <div style="margin-bottom:1.5rem;">
        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none"
             stroke="var(--wx-text-muted,#9ca3af)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
             style="display:block;margin:0 auto;">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <circle cx="12" cy="20" r="1" fill="var(--wx-text-muted,#9ca3af)" stroke="none"/>
        </svg>
      </div>

      <h1 class="wx-error-title">Bạn đang ngoại tuyến</h1>
      <p class="wx-error-desc">
        Không thể kết nối đến máy chủ.<br>
        Kiểm tra kết nối mạng của bạn và thử lại.
      </p>

      <!-- Tips -->
      <div style="margin:1.5rem 0;text-align:left;background:var(--wx-surface-2,rgba(0,0,0,0.04));border-radius:10px;padding:1rem 1.2rem;">
        <p style="font-size:0.82rem;font-weight:600;color:var(--wx-text-muted);margin:0 0 0.6rem;">Gợi ý khắc phục:</p>
        <ul style="margin:0;padding-left:1.2rem;font-size:0.85rem;color:var(--wx-text-muted);display:flex;flex-direction:column;gap:0.3rem;">
          <li>Kiểm tra kết nối Wi-Fi hoặc dữ liệu di động</li>
          <li>Tắt và bật lại Wi-Fi</li>
          <li>Thử kết nối mạng khác</li>
          <li>Khởi động lại router/modem</li>
        </ul>
      </div>

      <div class="wx-error-actions" style="justify-content:center;">
        <button class="wx-btn wx-btn-primary" id="retry-btn" onclick="retryConnection()">🔄 Thử kết nối lại</button>
      </div>

      <p id="retry-status" style="margin-top:1rem;font-size:0.82rem;color:var(--wx-text-muted);min-height:1.2em;"></p>
    </div>
  </div>

  <script src="../js/wemake.js"></script>
  <script>
    function retryConnection() {
      const btn = document.getElementById('retry-btn');
      const status = document.getElementById('retry-status');
      btn.disabled = true;
      btn.textContent = '⏳ Đang kiểm tra...';
      status.textContent = '';

      setTimeout(() => {
        if (navigator.onLine) {
          status.style.color = 'var(--wx-success,#22c55e)';
          status.textContent = '✅ Đã kết nối! Đang chuyển hướng...';
          setTimeout(() => location.reload(), 1000);
        } else {
          btn.disabled = false;
          btn.textContent = '🔄 Thử kết nối lại';
          status.style.color = 'var(--wx-danger,#ef4444)';
          status.textContent = '❌ Vẫn chưa có kết nối. Vui lòng thử lại.';
        }
      }, 1500);
    }

    window.addEventListener('online', () => {
      document.getElementById('retry-status').style.color = 'var(--wx-success,#22c55e)';
      document.getElementById('retry-status').textContent = '✅ Kết nối được khôi phục! Đang tải lại...';
      setTimeout(() => location.reload(), 800);
    });
  </script>
</body>
</html>
